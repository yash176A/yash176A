<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yashwanth Sena Veerupakshi, AI and ML Engineer">
  <defs>
    <linearGradient id="headline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF">
        <animate attributeName="stop-color" values="#58A6FF;#A371F7;#F778BA;#58A6FF" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#A371F7">
        <animate attributeName="stop-color" values="#A371F7;#F778BA;#58A6FF;#A371F7" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F778BA">
        <animate attributeName="stop-color" values="#F778BA;#58A6FF;#A371F7;#F778BA" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A371F7" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#79C0FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#79C0FF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="typewriter">
      <rect x="50" y="156" width="0" height="22">
        <animate attributeName="width" from="0" to="430" begin="0.8s" dur="2.6s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="900" height="220" fill="#0D1117"/>

  <!-- faint grid -->
  <g stroke="#21262D" stroke-width="1">
    <path d="M0,55 H900 M0,110 H900 M0,165 H900"/>
    <path d="M112,0 V220 M225,0 V220 M337,0 V220 M450,0 V220 M562,0 V220 M675,0 V220 M787,0 V220"/>
  </g>

  <!-- drifting particles -->
  <g fill="#30363D">
    <circle cx="0" cy="0" r="2">
      <animateMotion path="M120,30 q60,25 130,5 q70,-20 140,10" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="1.5">
      <animateMotion path="M90,200 q90,-18 180,4 q90,20 170,-8" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="2">
      <animateMotion path="M480,25 q-70,30 -150,12" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- neural network: 4 - 5 - 4 - 3 layers -->
  <g stroke="url(#edge)" stroke-width="1">
    <path d="M560,50 L650,35 M560,50 L650,75 M560,50 L650,115 M560,90 L650,75 M560,90 L650,115 M560,90 L650,155 M560,130 L650,115 M560,130 L650,155 M560,130 L650,195 M560,170 L650,155 M560,170 L650,195 M560,170 L650,35"/>
    <path d="M650,35 L740,50 M650,75 L740,50 M650,75 L740,90 M650,115 L740,90 M650,115 L740,130 M650,155 L740,130 M650,155 L740,170 M650,195 L740,170 M650,35 L740,130 M650,195 L740,50"/>
    <path d="M740,50 L830,70 M740,90 L830,70 M740,90 L830,110 M740,130 L830,110 M740,130 L830,150 M740,170 L830,150 M740,50 L830,150 M740,170 L830,70"/>
  </g>

  <!-- signal pulses travelling through the network -->
  <g fill="url(#pulse)">
    <circle r="4">
      <animateMotion path="M560,50 L650,75 L740,90 L830,110" dur="2.8s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.8s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="4">
      <animateMotion path="M560,170 L650,155 L740,130 L830,110" dur="3.4s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.4s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle r="4">
      <animateMotion path="M560,90 L650,115 L740,130 L830,150" dur="3.1s" begin="1.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.1s" begin="1.7s" repeatCount="indefinite"/>
    </circle>
    <circle r="4">
      <animateMotion path="M560,130 L650,115 L740,90 L830,70" dur="3.7s" begin="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.7s" begin="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="4">
      <animateMotion path="M560,50 L650,35 L740,50 L830,70" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="560" cy="50"  r="7" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
    <circle cx="560" cy="90"  r="7" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
    <circle cx="560" cy="130" r="7" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
    <circle cx="560" cy="170" r="7" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
    <circle cx="650" cy="35"  r="7" fill="#161B22" stroke="#7C6FF7" stroke-width="2"/>
    <circle cx="650" cy="75"  r="7" fill="#161B22" stroke="#7C6FF7" stroke-width="2"/>
    <circle cx="650" cy="115" r="7" fill="#161B22" stroke="#7C6FF7" stroke-width="2"/>
    <circle cx="650" cy="155" r="7" fill="#161B22" stroke="#7C6FF7" stroke-width="2"/>
    <circle cx="650" cy="195" r="7" fill="#161B22" stroke="#7C6FF7" stroke-width="2"/>
    <circle cx="740" cy="50"  r="7" fill="#161B22" stroke="#A371F7" stroke-width="2"/>
    <circle cx="740" cy="90"  r="7" fill="#161B22" stroke="#A371F7" stroke-width="2"/>
    <circle cx="740" cy="130" r="7" fill="#161B22" stroke="#A371F7" stroke-width="2"/>
    <circle cx="740" cy="170" r="7" fill="#161B22" stroke="#A371F7" stroke-width="2"/>
    <!-- output nodes breathe -->
    <circle cx="830" cy="70" r="8" fill="#161B22" stroke="#F778BA" stroke-width="2">
      <animate attributeName="r" values="8;10;8" dur="2.6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2.6s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="830" cy="110" r="8" fill="#161B22" stroke="#F778BA" stroke-width="2">
      <animate attributeName="r" values="8;10;8" dur="2.6s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2.6s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="830" cy="150" r="8" fill="#161B22" stroke="#F778BA" stroke-width="2">
      <animate attributeName="r" values="8;10;8" dur="2.6s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2.6s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- headline with animated gradient -->
  <text x="48" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="url(#headline)">Yashwanth Sena Veerupakshi</text>
  <text x="50" y="130" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#8B949E">AI &amp; ML Engineer · LLMs · RAG · Multi-Agent Systems · MLOps</text>

  <!-- terminal line, typed out then cursor keeps blinking -->
  <text x="50" y="172" font-family="Consolas, Monaco, monospace" font-size="14" fill="#3FB950" clip-path="url(#typewriter)">$ every claim in my repos is a number I actually measured</text>
  <rect x="52" y="161" width="8" height="14" fill="#3FB950">
    <animate attributeName="x" from="52" to="480" begin="0.8s" dur="2.6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" begin="3.4s" repeatCount="indefinite"/>
  </rect>
</svg>
